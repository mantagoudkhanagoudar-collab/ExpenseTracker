<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">💰 Expense Tracker</h1>

    <!-- Total Expenses -->
    <div class="card p-3 mb-4 shadow-sm">
        <h4>Total Expenses: ₹{{ total }}</h4>
    </div>

    <!-- Chart -->
    <div class="card p-3 mb-4 shadow-sm">
        <h5>📊 Spending by Category</h5>
        <canvas id="expenseChart"></canvas>
    </div>

    <!-- Add Button -->
    <div class="mb-3">
        <a href="/add" class="btn btn-primary">➕ Add Expense</a>
    </div>

    <!-- Table -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">All Expenses</h5>

            {% if expenses %}
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for exp in expenses %}
                    <tr>
                        <td>{{ exp.category }}</td>
                        <td>₹{{ exp.amount }}</td>
                        <td>{{ exp.date }}</td>
                        <td>
                            <a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
                <p>No expenses yet.</p>
            {% endif %}

        </div>
    </div>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const ctx = document.getElementById('expenseChart');

    const data = {
        labels: {{ categories | tojson }},
        datasets: [{
            label: 'Expenses',
            data: {{ amounts | tojson }},
        }]
    };

    new Chart(ctx, {
        type: 'pie',
        data: data,
    });
</script>

</body>
</html>
